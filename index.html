<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marija Mladenovska</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a0a2e 0%, #2d1b5e 50%, #1a0a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(180, 130, 255, 0.2);
      border-radius: 24px;
      padding: 60px 50px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9b59b6, #6c3483);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 700;
      color: white;
      border: 3px solid rgba(180, 130, 255, 0.4);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .role {
      font-size: 15px;
      font-weight: 400;
      color: #c084fc;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, #9b59b6, #c084fc);
      margin: 0 auto 28px;
      border-radius: 2px;
    }

    .bio {
      font-size: 15px;
      line-height: 1.8;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .link-btn.linkedin {
      background: rgba(10, 102, 194, 0.2);
      color: #7bb3f0;
      border-color: rgba(10, 102, 194, 0.3);
    }

    .link-btn.linkedin:hover {
      background: rgba(10, 102, 194, 0.35);
      transform: translateY(-2px);
    }

    .link-btn.instagram {
      background: rgba(193, 53, 132, 0.2);
      color: #f093c0;
      border-color: rgba(193, 53, 132, 0.3);
    }

    .link-btn.instagram:hover {
      background: rgba(193, 53, 132, 0.35);
      transform: translateY(-2px);
    }

    .link-btn.email {
      background: rgba(155, 89, 182, 0.2);
      color: #c084fc;
      border-color: rgba(155, 89, 182, 0.3);
    }

    .link-btn.email:hover {
      background: rgba(155, 89, 182, 0.35);
      transform: translateY(-2px);
    }

    .icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
  </style>
</head>
